<div class="container">
  <form action="get" [formGroup]="subscribeForm" (ngSubmit)="subscribe()" class="card">
    <h1>Register</h1>

    <label>Username</label>
    <input type="text" formControlName="username" placeholder="Type your username here..." />

    <label>Password</label>
    <input type="password" formControlName="password" placeholder="Type your password here..." />

    <button type="submit">Save</button>
  </form>
</div>
