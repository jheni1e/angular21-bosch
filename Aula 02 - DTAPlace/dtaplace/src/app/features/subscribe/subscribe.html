<div class="container">
  <div class="card">
    <h1>Register</h1>

    <label>Username</label>
    <input type="text" placeholder="Type your username here..." (change)="userChanged($event)" />

    <label>Password</label>
    <input type="password" placeholder="Type your password here..." (change)="pwChanged($event)" />

    <button (click)="submit()">Save</button>
  </div>
</div>
